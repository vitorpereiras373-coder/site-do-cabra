<div class="product-img" style="padding:0;overflow:hidden;position:relative;height:160px;">
  <img id="mslide-0" src="marauder-1.jpeg" alt="WiFi Marauder" style="width:100%;height:160px;object-fit:cover;position:absolute;top:0;left:0;opacity:1;transition:opacity 0.5s;">
  <img id="mslide-1" src="marauder-2.jpeg" alt="WiFi Marauder" style="width:100%;height:160px;object-fit:cover;position:absolute;top:0;left:0;opacity:0;transition:opacity 0.5s;">
  <img id="mslide-2" src="marauder-3.jpeg" alt="WiFi Marauder" style="width:100%;height:160px;object-fit:cover;position:absolute;top:0;left:0;opacity:0;transition:opacity 0.5s;">
  <div style="position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:5;">
    <span onclick="setMSlide(0)" style="width:7px;height:7px;border-radius:50%;background:#fff;cursor:pointer;opacity:1;display:inline-block;"></span>
    <span onclick="setMSlide(1)" style="width:7px;height:7px;border-radius:50%;background:#fff;cursor:pointer;opacity:0.4;display:inline-block;"></span>
    <span onclick="setMSlide(2)" style="width:7px;height:7px;border-radius:50%;background:#fff;cursor:pointer;opacity:0.4;display:inline-block;"></span>
  </div>
</div>

<script>
  var mCurrent = 0;
  function setMSlide(n) {
    for (var i = 0; i < 3; i++) {
      var img = document.getElementById('mslide-' + i);
      if (img) img.style.opacity = (i === n) ? '1' : '0';
    }
    mCurrent = n;
  }
  setInterval(function() { setMSlide((mCurrent + 1) % 3); }, 3000);
</script>
